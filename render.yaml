services:
  - type: web
    name: house-price-predictor
    runtime: python
    plan: free
    region: oregon
    buildCommand: |
      # Install system build tools
      apt-get update
      apt-get install -y build-essential python3-dev gcc g++ gfortran libopenblas-dev liblapack-dev
      
      # Upgrade pip
      pip install --upgrade pip setuptools wheel cython
      
      # Install packages in order
      pip install numpy==1.24.3
      pip install pandas==2.0.3 --no-build-isolation
      pip install scikit-learn==1.3.0
      pip install matplotlib==3.7.2
      pip install seaborn==0.12.2
      pip install plotly==5.18.0
      pip install joblib==1.3.2
      pip install xgboost==1.7.6
      pip install catboost==1.2.0
      pip install lightgbm==4.0.0
      pip install gunicorn==21.2.0
      pip install streamlit==1.28.1
      
      # Create dummy model for deployment
      mkdir -p models data
      python -c "
import joblib
import numpy as np
from sklearn.ensemble import RandomForestRegressor
from sklearn.preprocessing import StandardScaler
import pandas as pd

# Create dummy model
X = np.random.rand(100, 8)
y = np.random.rand(100) * 500000
model = RandomForestRegressor(n_estimators=10)
model.fit(X, y)
joblib.dump(model, 'models/best_model.pkl')
joblib.dump(model, 'models/house_price_model.pkl')

# Create scaler
scaler = StandardScaler()
scaler.fit(X)
joblib.dump(scaler, 'models/scaler.pkl')

# Sample data
df = pd.DataFrame({
    'area': np.random.randint(500,4000,100),
    'bedrooms': np.random.randint(1,6,100),
    'bathrooms': np.random.randint(1,4,100),
    'age': np.random.randint(0,50,100),
    'location_score': np.random.uniform(1,10,100),
    'garage_spaces': np.random.randint(0,3,100),
    'has_basement': np.random.randint(0,2,100),
    'has_pool': np.random.randint(0,2,100),
    'price': np.random.randint(50000,500000,100)
})
df.to_csv('data/housing.csv', index=False)
print('✅ Setup complete')
"
      
    startCommand: |
      streamlit run ui/app_dark_professional.py --server.port=$PORT --server.address=0.0.0.0 --server.enableCORS=false --server.enableXsrfProtection=false
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11